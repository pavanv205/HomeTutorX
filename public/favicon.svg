<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Multi-stop Realistic Gold Metallic Gradient -->
    <linearGradient id="goldMetallic" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C5A059" />
      <stop offset="20%" stop-color="#FDF0CD" />
      <stop offset="40%" stop-color="#D4AF37" />
      <stop offset="60%" stop-color="#F3E5AB" />
      <stop offset="80%" stop-color="#AA7C11" />
      <stop offset="100%" stop-color="#8A5A00" />
    </linearGradient>

    <!-- Border Gold Gradient -->
    <linearGradient id="goldBorder" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#8A5A00" />
      <stop offset="50%" stop-color="#FDF0CD" />
      <stop offset="100%" stop-color="#C5A059" />
    </linearGradient>

    <!-- Radial Dark Background Glow -->
    <radialGradient id="darkBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1A1A1A" />
      <stop offset="100%" stop-color="#050505" />
    </radialGradient>
  </defs>

  <!-- Circular Black Screen Background with Premium Gold Border -->
  <circle cx="256" cy="256" r="240" fill="url(#darkBg)" stroke="url(#goldBorder)" stroke-width="12" />

  <!-- Bold HT Letters in Realistic Gold -->
  <text 
    x="256" 
    y="262" 
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" 
    font-weight="900" 
    font-size="210" 
    fill="url(#goldMetallic)" 
    text-anchor="middle" 
    dominant-baseline="middle"
    letter-spacing="-2"
  >HT</text>
</svg>